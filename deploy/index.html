<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>厦门大学无人机</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 50%, #0d2137 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", "PingFang SC", sans-serif;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 40px 30px;
            position: relative;
            z-index: 1;
        }
        /* 无人机 SVG 图标 */
        .drone-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            animation: hover 2.5s ease-in-out infinite;
        }
        @keyframes hover {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        /* 主标题 */
        .title {
            font-size: 42px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 4px;
            margin-bottom: 12px;
            text-shadow: 0 0 40px rgba(100, 180, 255, 0.5);
        }
        /* 副标题 */
        .subtitle {
            font-size: 18px;
            color: rgba(180, 200, 230, 0.8);
            letter-spacing: 2px;
            margin-bottom: 30px;
        }
        /* 装饰线 */
        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #4da8da, transparent);
            margin: 0 auto 30px;
            border-radius: 2px;
        }
        /* 信息卡片 */
        .info-card {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 20px 30px;
            max-width: 320px;
            margin: 0 auto;
            backdrop-filter: blur(10px);
        }
        .info-label {
            font-size: 14px;
            color: rgba(180, 200, 230, 0.6);
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .info-value {
            font-size: 22px;
            font-weight: 600;
            color: #7cc5ff;
            letter-spacing: 1px;
        }
        /* 底部粒子效果 */
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            background: rgba(100, 180, 255, 0.6);
            border-radius: 50%;
            animation: float linear infinite;
        }
        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
        /* 成功对勾 */
        .checkmark {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: rgba(40, 200, 120, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .checkmark svg {
            width: 32px;
            height: 32px;
        }
    </style>
</head>
<body>
    <!-- 粒子背景 -->
    <div class="particles" id="particles"></div>

    <!-- 主内容 -->
    <div class="container">
        <!-- 成功标记 -->
        <div class="checkmark">
            <svg viewBox="0 0 24 24" fill="none" stroke="#28c878" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="4 12 10 18 20 6"/>
            </svg>
        </div>

        <!-- 无人机图标 -->
        <div class="drone-icon">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- 机身 -->
                <ellipse cx="50" cy="52" rx="22" ry="8" fill="#4da8da" opacity="0.9"/>
                <circle cx="50" cy="50" r="6" fill="#7cc5ff"/>
                <!-- 机臂 -->
                <line x1="30" y1="48" x2="12" y2="28" stroke="#4da8da" stroke-width="2.5" stroke-linecap="round"/>
                <line x1="70" y1="48" x2="88" y2="28" stroke="#4da8da" stroke-width="2.5" stroke-linecap="round"/>
                <line x1="30" y1="52" x2="12" y2="72" stroke="#4da8da" stroke-width="2.5" stroke-linecap="round"/>
                <line x1="70" y1="52" x2="88" y2="72" stroke="#4da8da" stroke-width="2.5" stroke-linecap="round"/>
                <!-- 旋翼 -->
                <circle cx="12" cy="26" r="5" stroke="#7cc5ff" stroke-width="1.5" fill="rgba(100,180,255,0.2)"/>
                <circle cx="88" cy="26" r="5" stroke="#7cc5ff" stroke-width="1.5" fill="rgba(100,180,255,0.2)"/>
                <circle cx="12" cy="74" r="5" stroke="#7cc5ff" stroke-width="1.5" fill="rgba(100,180,255,0.2)"/>
                <circle cx="88" cy="74" r="5" stroke="#7cc5ff" stroke-width="1.5" fill="rgba(100,180,255,0.2)"/>
                <!-- 信号波 -->
                <path d="M50 38 Q60 30 70 33" stroke="#7cc5ff" stroke-width="1.2" opacity="0.5" fill="none"/>
                <path d="M50 34 Q64 22 78 27" stroke="#7cc5ff" stroke-width="0.8" opacity="0.3" fill="none"/>
            </svg>
        </div>

        <!-- 标题 -->
        <h1 class="title">厦门大学无人机</h1>
        <p class="subtitle">Xiamen University UAV</p>

        <!-- 分隔线 -->
        <div class="divider"></div>

        <!-- 信息卡片 -->
        <div class="info-card">
            <div class="info-label">识别状态</div>
            <div class="info-value">✓ 二维码识别成功</div>
        </div>
    </div>

    <script>
        // ====== 微信扫码成功自动播放提示音 ======
        // 使用 Web Audio API 合成（无需加载文件，微信最可靠方案）
        var AudioContext = window.AudioContext || window.webkitAudioContext;
        var audioCtx = null;
        var beepPlayed = false;

        function playBeep() {
            if (beepPlayed) return;
            beepPlayed = true;
            try {
                if (!audioCtx) {
                    audioCtx = new AudioContext();
                }
                // 微信新版需要 resume
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                var now = audioCtx.currentTime;
                var osc = audioCtx.createOscillator();
                var gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                // 800Hz 正弦波，模拟原 beep.wav
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                // 音量从 0.7 渐弱到 0
                gain.gain.setValueAtTime(0.7, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.35);
                console.log('✓ 提示音已播放 (Web Audio)');
            } catch(e) {
                console.log('播放失败:', e.message);
            }
        }

        // 微信内置浏览器：WeixinJSBridge 就绪后触发
        document.addEventListener('WeixinJSBridgeReady', function() {
            console.log('WeixinJSBridge 就绪，播放提示音');
            playBeep();
        }, false);

        // 兼容旧版微信直接调用
        try {
            if (typeof WeixinJSBridge !== 'undefined' && WeixinJSBridge.invoke) {
                WeixinJSBridge.invoke('getNetworkType', {}, function() {
                    playBeep();
                });
            }
        } catch(e) {}

        // 普通浏览器：页面加载后尝试
        window.addEventListener('load', function() {
            setTimeout(playBeep, 600);
        });

        // 用户首次触摸/点击时播放（兜底方案，突破所有浏览器限制）
        document.addEventListener('touchstart', function once() {
            playBeep();
        }, { once: true });
        document.addEventListener('click', function once() {
            playBeep();
        }, { once: true });

        // ====== 生成浮动粒子 ======
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 35; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 3 + 1.5;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = (Math.random() * 8 + 6) + 's';
            particle.style.animationDelay = Math.random() * 8 + 's';
            particlesContainer.appendChild(particle);
        }
    </script>
</body>
</html>
